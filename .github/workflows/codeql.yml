name: "CodeQL Advanced"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  codeql:
    uses: reactiveui/actions-common/.github/workflows/workflow-common-codeql.yml@main
    with:
      srcFolder: src
      solutionFile: reactiveui.slnx
      installWorkloads: true
      analyzeCSharp: true
      analyzeActions: true
      analyzeJavaScript: true
